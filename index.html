<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dark Star Literary Agency</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c1020;
        --panel: #11182d;
        --text: #f4f1ea;
        --muted: #b8bfd6;
        --accent: #f0c674;
      }

      html, body {
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top, rgba(240, 198, 116, 0.18), transparent 30%),
          linear-gradient(160deg, #050814, var(--bg) 60%, #040507);
        color: var(--text);
      }

      main {
        width: min(90vw, 720px);
        padding: 4rem 2rem;
        text-align: center;
        background: rgba(17, 24, 45, 0.78);
        border: 1px solid rgba(240, 198, 116, 0.22);
        border-radius: 24px;
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 4.25rem);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      p {
        margin: 1rem 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.2rem);
      }

      .accent {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Welcome to <span class="accent">Dark Star Literary Agency</span></h1>
      <p>Stories with gravity, voice, and reach.</p>
    </main>
  </body>
</html>
